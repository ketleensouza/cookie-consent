<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cookie Consent Banner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Banner de Cookies -->
  <div class="cookie-consent" id="cookieConsent" role="dialog" aria-live="polite" aria-label="Cookies">
    <p class="cookie-consent__text">
      Utilizamos cookies para melhorar sua experiência de navegação.
      Ao continuar no site, você concorda com nossa política de cookies.
      <a href="#" target="_blank" rel="noopener" class="cookie-consent_link" id="cookieMoreInfo">
        Mais informações.
      </a>
    </p>
    <div class="cookie-consent__actions">
      <button type="button" id="cookieAccept">Sim, aceito cookies</button>
      <button type="button" id="cookieReject">Recusar</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
